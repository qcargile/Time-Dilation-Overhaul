Ability.ESR_MeleeSurvivalEffector:
  $type: Effector
  effectorClassName: Phoenicia.EnemySandevistanRework.Effectors.SurvivalEffector
  removeAfterActionCall: true
  prereqRecord: 
    $type: MultiPrereq
    prereqClassName: gameMultiPrereq
    aggregationType: AND
    nestedPrereqs: 
      - $type: HitPrereq
        callbackType: HitReceived
        conditions: 
          - $type: HitPrereqCondition
            type: Prereqs.WeaponType
            weaponType: Ranged       
        ignoreSelfInflictedPressureWave: true
        isSynchronous: true
        pipelineStage: Process
        pipelineType: Damage
        prereqClassName: HitReceivedPrereq


Ability.ESR_MeleeDefenseEffector:
  $type: Effector
