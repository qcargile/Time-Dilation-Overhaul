      - $type: HitPrereq
        callbackType: HitReceived
        conditions: 
          - $type: HitPrereqCondition
            type: Prereqs.WeaponType
            weaponType: Melee       
        ignoreSelfInflictedPressureWave: true
        isSynchronous: true
        pipelineStage: Process
        pipelineType: Damage
        prereqClassName: HitReceivedPrereq

